name: Build & Test Pipeline

on:
  push:
    branches: [ master, develop, 'feature/**' ]
  pull_request:
    branches: [ master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Nightly builds

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest ]
        dotnet-version: [ '8.0.x' ]
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for versioning
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts-${{ matrix.os }}
        path: |
          **/bin/Release/
          **/publish/
        retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Run unit tests
      run: dotnet test tests/MonadoBlade.Tests.Unit/MonadoBlade.Tests.Unit.csproj --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: unit-test-results
        path: '**/TestResults/**'
    
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Unit Test Results
        path: '**/TestResults/*.trx'
        reporter: 'dotnet trx'

  integration-tests:
    name: Integration Tests
    runs-on: windows-latest
    needs: build
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Run integration tests
      run: dotnet test tests/MonadoBlade.Tests.Integration/MonadoBlade.Tests.Integration.csproj --configuration Release --logger "trx;LogFileName=test-results.trx"
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: '**/TestResults/**'
    
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Integration Test Results
        path: '**/TestResults/*.trx'
        reporter: 'dotnet trx'

  performance-tests:
    name: Performance Tests
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Run performance benchmarks
      run: dotnet test tests/MonadoBlade.Tests.Performance/MonadoBlade.Tests.Performance.csproj --configuration Release --logger "trx;LogFileName=perf-results.trx"
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: performance-benchmark-results
        path: '**/BenchmarkDotNet.Artifacts/**'
    
    - name: Comment PR with benchmark results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const benchmarkPath = 'tests/MonadoBlade.Tests.Performance/BenchmarkDotNet.Artifacts/results/index.md';
          if (fs.existsSync(benchmarkPath)) {
            const results = fs.readFileSync(benchmarkPath, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📊 Performance Benchmark Results\n\n' + results
            });
          }

  code-quality:
    name: Code Quality Analysis
    runs-on: windows-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for analysis
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Run StyleCop analysis
      run: dotnet build --configuration Release /p:EnforceCodeStyleInBuild=true /p:TreatWarningsAsErrors=false
      continue-on-error: true
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      if: env.SONAR_TOKEN != ''

  security-scan:
    name: Security Scan
    runs-on: windows-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run dependency check
      run: |
        dotnet add package OfficialDependencyChecker --version 1.0.0 || true
        dotnet list package --vulnerable
      continue-on-error: true
    
    - name: SAST - CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: 'csharp'
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v3
      with:
        path: test-results
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: test-results/**/TestResults/*.trx
        check_name: Test Results Summary
        comment_mode: always

  coverage:
    name: Code Coverage Report
    runs-on: windows-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download coverage results
      uses: actions/download-artifact@v3
      with:
        name: unit-test-results
    
    - name: Report coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: '**/coverage.cobertura.xml'
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [ build, unit-tests, integration-tests ]
    if: always()
    
    steps:
    - name: Determine status
      run: |
        if [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.unit-tests.result }}" = "failure" ] || [ "${{ needs.integration-tests.result }}" = "failure" ]; then
          echo "status=failure" >> $GITHUB_ENV
        else
          echo "status=success" >> $GITHUB_ENV
        fi
    
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.24.0
      if: env.SLACK_WEBHOOK_URL != ''
      with:
        payload: |
          {
            "text": "MonadoBlade Build ${{ env.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*MonadoBlade v3.3.0 Build*\n*Status:* ${{ env.status }}\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
